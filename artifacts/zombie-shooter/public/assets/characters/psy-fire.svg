<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220" width="160" height="220">
  <defs>
    <radialGradient id="glow-fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9940" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="f-fire">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Body glow -->
  <ellipse cx="80" cy="140" rx="45" ry="60" fill="url(#glow-fire)" opacity="0.5"/>

  <!-- Legs -->
  <rect x="58" y="170" width="18" height="40" rx="8" fill="#200800"/>
  <rect x="84" y="170" width="18" height="40" rx="8" fill="#200800"/>
  <rect x="58" y="196" width="18" height="14" rx="4" fill="#ff6600" opacity="0.5"/>
  <rect x="84" y="196" width="18" height="14" rx="4" fill="#ff6600" opacity="0.5"/>
  <!-- Flame feet -->
  <ellipse cx="67" cy="210" rx="9" ry="4" fill="#ff4400" opacity="0.5" filter="url(#f-fire)"/>
  <ellipse cx="93" cy="210" rx="9" ry="4" fill="#ff4400" opacity="0.5" filter="url(#f-fire)"/>

  <!-- Body/torso -->
  <rect x="50" y="115" width="60" height="60" rx="14" fill="#2a0800"/>
  <rect x="50" y="115" width="60" height="60" rx="14" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.8"/>
  <!-- Flame cracks on body -->
  <path d="M 65 125 Q 70 132 67 140 Q 72 138 75 145" stroke="#ff6600" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 90 128 Q 95 135 92 143" stroke="#ff4400" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Chest ψ emblem -->
  <text x="80" y="153" font-family="Georgia,serif" font-size="24" fill="#ff8830" text-anchor="middle" opacity="0.95" filter="url(#f-fire)">ψ</text>

  <!-- Left arm (raised with weapon) -->
  <rect x="22" y="100" width="14" height="50" rx="7" fill="#2a0800" stroke="#ff6600" stroke-width="1" opacity="0.9"/>
  <!-- Fire staff -->
  <rect x="27" y="40" width="6" height="66" rx="3" fill="#cc3300"/>
  <!-- Flame on top -->
  <path d="M 30 10 Q 20 20 22 32 Q 28 26 30 30 Q 32 26 38 32 Q 40 20 30 10" fill="#ff9940" filter="url(#f-fire)"/>
  <path d="M 30 16 Q 24 24 26 32 Q 30 28 30 32 Q 34 28 34 32 Q 36 24 30 16" fill="#ffcc00" opacity="0.7"/>

  <!-- Right arm (at side) -->
  <rect x="124" y="118" width="14" height="40" rx="7" fill="#2a0800" stroke="#ff6600" stroke-width="1" opacity="0.9"/>

  <!-- Neck -->
  <rect x="72" y="98" width="16" height="20" rx="6" fill="#2a0800"/>

  <!-- Head -->
  <ellipse cx="80" cy="82" rx="26" ry="28" fill="#2a0800" stroke="#ff6600" stroke-width="1.5"/>
  <!-- Visor -->
  <rect x="60" y="74" width="40" height="14" rx="7" fill="#ff6600" opacity="0.6"/>
  <rect x="62" y="76" width="36" height="10" rx="5" fill="#ffaa60" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="69" cy="81" r="4" fill="#ff6600"/>
  <circle cx="91" cy="81" r="4" fill="#ff6600"/>
  <circle cx="69" cy="81" r="2" fill="#ffdd00" opacity="0.9"/>
  <circle cx="91" cy="81" r="2" fill="#ffdd00" opacity="0.9"/>
  <!-- Flame hair/crown -->
  <path d="M 62 60 Q 58 44 65 38 Q 68 50 70 54 Q 74 38 80 30 Q 86 38 90 54 Q 92 50 95 38 Q 102 44 98 60" fill="#ff6600" filter="url(#f-fire)"/>
  <path d="M 68 60 Q 66 48 70 42 Q 72 52 75 55 Q 78 42 80 36 Q 82 42 85 55 Q 88 52 90 42 Q 94 48 92 60" fill="#ffaa00" opacity="0.7"/>

  <!-- Energy particles / embers -->
  <circle cx="42" cy="55" r="2.5" fill="#ff8830" opacity="0.7" filter="url(#f-fire)"/>
  <circle cx="35" cy="75" r="1.5" fill="#ff6600" opacity="0.5"/>
  <circle cx="48" cy="40" r="2" fill="#ffcc00" opacity="0.6"/>
  <circle cx="118" cy="65" r="1.5" fill="#ff8830" opacity="0.5"/>
</svg>
