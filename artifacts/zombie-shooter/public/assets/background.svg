<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="60%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#000509"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="80%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow1)"/>
  <rect width="1280" height="720" fill="url(#glow2)"/>
  <rect width="1280" height="720" fill="url(#glow3)"/>

  <!-- Large central PSY symbol -->
  <text x="640" y="440" font-family="Georgia,serif" font-size="420" fill="#00d4ff" text-anchor="middle" opacity="0.04">ψ</text>

  <!-- Medium PSY symbols scattered -->
  <text x="120" y="200" font-family="Georgia,serif" font-size="140" fill="#00d4ff" text-anchor="middle" opacity="0.05">ψ</text>
  <text x="1160" y="580" font-family="Georgia,serif" font-size="120" fill="#00d4ff" text-anchor="middle" opacity="0.045">ψ</text>
  <text x="1050" y="160" font-family="Georgia,serif" font-size="90" fill="#00b4ff" text-anchor="middle" opacity="0.04">ψ</text>
  <text x="220" y="620" font-family="Georgia,serif" font-size="80" fill="#00b4ff" text-anchor="middle" opacity="0.04">ψ</text>

  <!-- Grid lines - subtle -->
  <g stroke="#00d4ff" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Floating particles -->
  <g fill="#00d4ff">
    <circle cx="200" cy="150" r="2" opacity="0.25"/>
    <circle cx="450" cy="80" r="1.5" opacity="0.2"/>
    <circle cx="750" cy="100" r="2.5" opacity="0.15"/>
    <circle cx="1000" cy="200" r="1.5" opacity="0.2"/>
    <circle cx="1200" cy="90" r="2" opacity="0.18"/>
    <circle cx="80" cy="400" r="1.5" opacity="0.15"/>
    <circle cx="350" cy="500" r="2" opacity="0.18"/>
    <circle cx="900" cy="600" r="1.5" opacity="0.15"/>
    <circle cx="1150" cy="450" r="2.5" opacity="0.2"/>
    <circle cx="580" cy="650" r="1.5" opacity="0.15"/>
    <circle cx="700" cy="300" r="1.5" opacity="0.12"/>
    <circle cx="320" cy="280" r="2" opacity="0.14"/>
    <circle cx="1080" cy="350" r="1.5" opacity="0.12"/>
  </g>

  <!-- Horizontal scan line at bottom -->
  <rect x="0" y="680" width="1280" height="1" fill="#00d4ff" opacity="0.12"/>
  <rect x="0" y="700" width="1280" height="0.5" fill="#00d4ff" opacity="0.06"/>

  <!-- Ground plane gradient -->
  <rect x="0" y="600" width="1280" height="120" fill="url(#bg)" opacity="0.4"/>
  <rect x="0" y="650" width="1280" height="70">
    <animate attributeName="opacity" values="0.0;0.06;0.0" dur="4s" repeatCount="indefinite"/>
    <set attributeName="fill" to="#00d4ff"/>
  </rect>
</svg>
